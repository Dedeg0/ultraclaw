apiVersion: v1
kind: ConfigMap
metadata:
  name: ultraclaw-config
  labels:
    app: ultraclaw
data:
  ultraclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18790,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.ultraclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "UltraClaw Assistant",
            "workspace": "~/.ultraclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # UltraClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
