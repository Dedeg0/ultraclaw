services:
  - type: web
    name: ultraclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ULTRACLAW_STATE_DIR
        value: /data/.ultraclaw
      - key: ULTRACLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: ULTRACLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: ultraclaw-data
      mountPath: /data
      sizeGB: 1
