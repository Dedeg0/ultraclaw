name: UltraClaw
options:
  bundleIdPrefix: ai.ultraclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  UltraClawKit:
    path: ../shared/UltraClawKit
  Swabble:
    path: ../../Swabble

schemes:
  UltraClaw:
    shared: true
    build:
      targets:
        UltraClaw: all
    test:
      targets:
        - UltraClawTests
        - UltraClawLogicTests
  UltraClawLogicTests:
    shared: true
    build:
      targets:
        UltraClawLogicTests: all
    test:
      targets:
        - UltraClawLogicTests

targets:
  UltraClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: UltraClawShareExtension
        embed: true
      - target: UltraClawActivityWidget
        embed: true
      - target: UltraClawWatchApp
      - package: UltraClawKit
      - package: UltraClawKit
        product: UltraClawChatUI
      - package: UltraClawKit
        product: UltraClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/UltraClaw.entitlements
        CODE_SIGN_STYLE: "$(ULTRACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ULTRACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(ULTRACLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(ULTRACLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          ULTRACLAW_PUSH_TRANSPORT: direct
          ULTRACLAW_PUSH_DISTRIBUTION: local
          ULTRACLAW_PUSH_RELAY_BASE_URL: ""
          ULTRACLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          ULTRACLAW_PUSH_TRANSPORT: direct
          ULTRACLAW_PUSH_DISTRIBUTION: local
          ULTRACLAW_PUSH_RELAY_BASE_URL: ""
          ULTRACLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: UltraClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.ultraclaw.ios
            CFBundleURLSchemes:
              - ultraclaw
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.ultraclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: UltraClaw discovers and connects to your UltraClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _ultraclaw-gw._tcp
        NSCameraUsageDescription: UltraClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: UltraClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: UltraClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: UltraClaw needs microphone access for voice wake.
        NSMotionUsageDescription: UltraClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: UltraClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: UltraClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UltraClawPushTransport: "$(ULTRACLAW_PUSH_TRANSPORT)"
        UltraClawPushDistribution: "$(ULTRACLAW_PUSH_DISTRIBUTION)"
        UltraClawPushRelayBaseURL: "$(ULTRACLAW_PUSH_RELAY_BASE_URL)"
        UltraClawPushAPNsEnvironment: "$(ULTRACLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  UltraClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: UltraClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ULTRACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ULTRACLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(ULTRACLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(ULTRACLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: UltraClaw Share
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  UltraClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/UltraClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ULTRACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ULTRACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(ULTRACLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: UltraClaw Activity
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  UltraClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: UltraClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(ULTRACLAW_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: UltraClaw
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(ULTRACLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  UltraClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(ULTRACLAW_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: UltraClaw
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(ULTRACLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  UltraClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: UltraClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ULTRACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ULTRACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.ultraclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UltraClaw.app/UltraClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: UltraClawTests
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"

  UltraClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: UltraClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ULTRACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ULTRACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.ultraclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: UltraClawLogicTests
        CFBundleShortVersionString: "$(ULTRACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ULTRACLAW_BUILD_VERSION)"
