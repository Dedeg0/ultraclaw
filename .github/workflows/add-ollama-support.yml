name: Add Ollama Default Support

on:
  workflow_dispatch:

jobs:
  add-ollama:
    name: Configure Ollama as default LLM
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Write UltraClaw OS files
      env:
        OS_DEFAULTS: |
          export const ULTRACLAW_OS = process.env['ULTRACLAW_OS'] === '1';
          export const OS_DEFAULTS = {
            gatewayPort: 18790,
            configDir: '~/.ultraclaw',
            dataDir: '/var/claw',
            defaultModel: 'ollama/llama3.2',
            modelFallbackChain: ['ollama/llama3.2','anthropic/claude-haiku-4-5-20251001','openai/gpt-4o-mini'],
            ollama: { host: process.env['OLLAMA_HOST'] ?? 'http://127.0.0.1:11434', defaultModel: process.env['OLLAMA_DEFAULT_MODEL'] ?? 'llama3.2' },
            product: { name: 'UltraClaw OS', version: process.env['ULTRACLAW_OS_VERSION'] ?? '0.1.0', configName: 'ultraclaw' },
          } as const;
          export function getOSAgentConfig(userConfig: Record<string, unknown> = {}) {
            if (!ULTRACLAW_OS) return userConfig;
            return { agent: { model: OS_DEFAULTS.defaultModel, ...(userConfig['agent'] as object ?? {}) }, gateway: { port: OS_DEFAULTS.gatewayPort, ...(userConfig['gateway'] as object ?? {}) }, ...userConfig };
          }
        OLLAMA_PROVIDER: |
          export class OllamaProvider {
            readonly host: string;
            constructor(host = 'http://127.0.0.1:11434') { this.host = host; }
            async isAvailable(): Promise<boolean> {
              try { const res = await fetch(`${this.host}/api/tags`, { signal: AbortSignal.timeout(2000) }); return res.ok; } catch { return false; }
            }
            async listModels(): Promise<{name:string}[]> {
              const res = await fetch(`${this.host}/api/tags`);
              const data = await res.json() as { models: {name:string}[] };
              return data.models ?? [];
            }
            async chat(model: string, messages: {role:string;content:string}[]): Promise<string> {
              const res = await fetch(`${this.host}/api/chat`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ model, messages, stream: false }) });
              const data = await res.json() as { message: {content:string} };
              return data.message.content;
            }
          }
          export const ollama = new OllamaProvider(process.env['OLLAMA_HOST'] ?? 'http://127.0.0.1:11434');
      run: |
        mkdir -p core/src/ultraclaw core/config
        printf '%s\n' "$OS_DEFAULTS"       > core/src/ultraclaw/os-defaults.ts
        printf '%s\n' "$OLLAMA_PROVIDER"   > core/src/ultraclaw/ollama-provider.ts
        printf '%s\n' "export { OllamaProvider, ollama } from './ollama-provider.js';" > core/src/ultraclaw/index.ts
        printf '%s\n' "export { OS_DEFAULTS, ULTRACLAW_OS, getOSAgentConfig } from './os-defaults.js';" >> core/src/ultraclaw/index.ts
        cat > core/.env.ultraclaw << 'EOF'
        ULTRACLAW_OS=1
        OLLAMA_HOST=http://127.0.0.1:11434
        OLLAMA_DEFAULT_MODEL=llama3.2
        ULTRACLAW_GATEWAY_PORT=18790
        EOF
        cat > core/config/ultraclaw-os.json << 'EOF'
        {"agent":{"model":"ollama/llama3.2"},"gateway":{"port":18790,"bind":"loopback"}}
        EOF
        echo "Files written:"
        find core/src/ultraclaw core/config core/.env.ultraclaw -type f

    - name: Commit and push
      run: |
        git add -A
        git diff --cached --stat
        git commit -m "feat: add Ollama as default LLM provider for UltraClaw OS" || echo "Nothing to commit"
        git push origin main